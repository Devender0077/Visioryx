# Visioryx - Docker Compose
# AI Powered Real-Time Face Recognition & Surveillance System

services:
  db:
    image: postgres:16-alpine
    container_name: visioryx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visioryx
    volumes:
      - visioryx_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Host 5433 to avoid conflict with local PostgreSQL on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: visioryx-backend
    env_file:
      - ../backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/visioryx
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/visioryx
    ports:
      - "8000:8000"
    volumes:
      - ../backend/storage:/app/storage
      - ../backend/models:/app/models
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: visioryx-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # AI Worker - Phase 2 (camera processing, face recognition, object detection)
  # ai-worker:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.backend
  #   command: python -m app.workers.ai_worker
  #   ...

volumes:
  visioryx_pgdata:
