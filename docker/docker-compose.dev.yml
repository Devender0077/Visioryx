# Dev: Postgres only (run backend/frontend locally)
services:
  db:
    image: postgres:16-alpine
    container_name: visioryx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visioryx
    volumes:
      - visioryx_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  visioryx_pgdata:
